<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - ZHANG Market</title>
    <link rel="stylesheet" href="panel.css">
</head>
<body>

<div class="panel-container">

    <h2>Mi Perfil</h2>

    <div class="perfil-box">
        <img id="fotoPerfil" src="img/default.png" alt="Foto de perfil">

        <div class="info">
            <p><strong>Correo:</strong> <span id="correoUsuario"></span></p>
            <p><strong>Dirección:</strong> <span id="direccionUsuario">No registrada</span></p>
        </div>
    </div>

    <button class="btn" onclick="editar()">Editar datos</button>
    <button class="btn logout" onclick="logout()">Cerrar sesión</button>

</div>

<script src="panel.js"></script>
</body>
</html>
