<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - ZHANG Market</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="login-container">
    <h2>Recuperar Contraseña</h2>

    <input type="email" id="email" placeholder="Ingresa tu correo registrado">

    <button onclick="recuperar()">Enviar</button>

    <p class="link"><a href="login.html">Volver al inicio de sesión</a></p>
</div>

<script>
function registrar() {
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    // VALIDACIÓN DE CAMPOS VACÍOS
    if (email === "" || pass === "") {
        alert("Completa todos los campos");
        return;
    }

    // VALIDACIÓN DE CORREO (formato correcto)
    let regexCorreo = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!regexCorreo.test(email)) {
        alert("Ingresa un correo válido (ejemplo: nombre@gmail.com)");
        return;
    }

    // VALIDACIÓN DE CONTRASEÑA FUERTE
    let regexPass = /^(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*]).{6,}$/;

    if (!regexPass.test(pass)) {
        alert("La contraseña debe tener:\n- Al menos 6 caracteres\n- Una mayúscula\n- Un número\n- Un símbolo (!@#$%^&*)");
        return;
    }

    // GUARDAR DATOS
    localStorage.setItem("userEmail", email);
    localStorage.setItem("userPass", pass);

    alert("Cuenta creada con éxito");
    window.location.href = "login.html";
}

</script>

</body>
</html>
