<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - ZHANG Market</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="login-container">
    <h2>Crear Cuenta</h2>

    <input type="email" id="email" placeholder="Correo electrónico">
    <input type="password" id="password" placeholder="Contraseña">

    <button onclick="registrar()">Registrarme</button>

    <p class="link">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
</div>
;
}

<script>
function registrar() {
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    // VALIDACIÓN DE CAMPOS VACÍOS
    if (email === "" || pass === "") {
        alert("Completa todos los campos");
        return;
    }

    // VALIDACIÓN DE CORREO
    let regexCorreo = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!regexCorreo.test(email)) {
        alert("Ingresa un correo válido (ejemplo: nombre@gmail.com)");
        return;
    }

    // VALIDACIÓN DE CONTRASEÑA FUERTE
    let regexPass = /^(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*]).{6,}$/;
    if (!regexPass.test(pass)) {
        alert("La contraseña debe tener:\n- Al menos 6 caracteres\n- Una mayúscula\n- Un número\n- Un símbolo (!@#$%^&*)");
        return;
    }

    // OBTENER USUARIOS EXISTENTES
    let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

    // VERIFICAR SI YA EXISTE EL CORREO
    let existe = usuarios.find(u => u.email === email);
    if (existe) {
        alert("Este correo ya está registrado");
        return;
    }

    // GUARDAR NUEVO USUARIO
    usuarios.push({ email: email, pass: pass });
    localStorage.setItem("usuarios", JSON.stringify(usuarios));

    alert("Registro exitoso. Ahora puedes iniciar sesión.");
    window.location.href = "login.html";
}

</script>



</body>
</html>
