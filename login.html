<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - ZHANG Market</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="login-container">
    <h2>Iniciar Sesión</h2>

    <input type="email" id="email" placeholder="Correo electrónico">
    <input type="password" id="password" placeholder="Contraseña">

    <button onclick="login()">Entrar</button>
<p class="link"><a href="recuperar.html">¿Olvidaste tu contraseña?</a></p>

    <p class="link">¿No tienes cuenta? <a href="registro.html">Regístrate</a></p>
</div>

<script src="login.js"></script>
    <script>
function login() {
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

    // BUSCAR USUARIO
    let user = usuarios.find(u => u.email === email && u.pass === pass);

    if (user) {
        localStorage.setItem("usuarioActivo", email);
        alert("Inicio de sesión exitoso");
        window.location.href = "index.html"; // o "carrito.html" si quieres ir directo
    } else {
        alert("Correo o contraseña incorrectos");
    }
}
</script>

</body>
</html>
